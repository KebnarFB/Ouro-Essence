<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ouro Essence</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Imagenes/Logo.png">
</head>
<body>

    <header>
        <img src="Imagenes/Logo.png" alt="Logo de Ouro Essence" class="logo" width="100" height="100">
        <h1>Ouro Essence</h1>
    </header>

    <nav>
        <a class="activo">Anillos</a>
        <a href="collares.html">Collares</a>
        <a href="pendientes.html">Pendientes</a>
        <a href="brazalete.html">Brazaletes</a>
        <a href="broche.html">Broches</a>
    </nav>

    <section class="productos">
        <div class="producto">
            <div>
                <img src="/Imagenes/Anillo/Anillo_Lineal.png" alt="Anillo con diamante en forma de línea" class="imagen-placeholder">
            </div>
            <p>Anillo con diamante en forma de óvalo.</p>
            <p class="precio">$20,000</p>
            <form action="/pay" method="post" style="display: inline;">
                <input type="hidden" name="nombre" value="Anillo con diamante en forma de óvalo">
                <input type="hidden" name="precio" value="20000">
                <input type="hidden" name="cantidad" value="1">
                <input type="hidden" name="sku" value="ANILLO-OVALO-001">
                <button type="submit" class="comprar">Pulse aquí para comprar</button>
            </form>
        </div>

        <div class="producto">
            <div>
                <img src="/Imagenes/Anillo/Anillo_Cuadrado.png" alt="Anillo con diamante en forma de cuadrado" class="imagen-placeholder">
            </div>
            <p>Anillo con diamante en forma de cuadrado.</p>
            <p class="precio">$22,000</p>
            <form action="/pay" method="post" style="display: inline;">
                <input type="hidden" name="nombre" value="Anillo con diamante en forma de cuadrado">
                <input type="hidden" name="precio" value="22000">
                <input type="hidden" name="cantidad" value="1">
                <input type="hidden" name="sku" value="ANILLO-CUADRADO-001">
                <button type="submit" class="comprar">Pulse aquí para comprar</button>
            </form>
        </div>

        <div class="producto">
            <div>
                <img src="/Imagenes/Anillo/Anillo_Redondo.png" alt="Anillo con diamante en forma de círculo" class="imagen-placeholder">
            </div>
            <p>Anillo con diamante en forma de círculo.</p>
            <p class="precio">$24,000</p>
            <form action="/pay" method="post" style="display: inline;">
                <input type="hidden" name="nombre" value="Anillo con diamante en forma de círculo">
                <input type="hidden" name="precio" value="24000">
                <input type="hidden" name="cantidad" value="1">
                <input type="hidden" name="sku" value="ANILLO-CIRCULO-001">
                <button type="submit" class="comprar">Pulse aquí para comprar</button>
            </form>
        </div>
    </section>

</body>
</html>
