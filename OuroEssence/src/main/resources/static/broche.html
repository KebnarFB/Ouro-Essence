<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ouro Essence</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Imagenes/Logo.png">
</head>
<body>

    <header>
        <img src="Imagenes/Logo.png" alt="Logo de Ouro Essence" class="logo" width="100" height="100">
        <h1>Ouro Essence</h1>
    </header>

    <nav>
        <a href="index.html">Anillos</a>
        <a href="collares.html">Collares</a>
        <a href="pendientes.html">Pendientes</a>
        <a href="brazalete.html">Brazaletes</a>

    <section class="productos">
        <div class="producto">
            <div>
                <img src="/Imagenes/Broche/Broche_hojas.PNG" alt="Broche con hojas" class="imagen-placeholder">
            </div>
            <p>Broche con diseño de hojas.</p>
            <p class="precio">$20,000</p>
            <form action="/pay" method="post" style="display: inline;">
                <input type="hidden" name="nombre" value="Broche con diseño de hojas">
                <input type="hidden" name="precio" value="20000">
                <input type="hidden" name="cantidad" value="1">
                <input type="hidden" name="sku" value="BROCHE-HOJAS-001">
                <button type="submit" class="comprar">Pulse aquí para comprar</button>
            </form>
        </div>

        <div class="producto">
            <div>
                <img src="/Imagenes/Broche/Broche_mariposas.PNG" alt="Broche con mariposas" class="imagen-placeholder">
            </div>
            <p>Broche con diseño de mariposas.</p>
            <p class="precio">$22,000</p>
            <form action="/pay" method="post" style="display: inline;">
                <input type="hidden" name="nombre" value="Broche con diseño de mariposas">
                <input type="hidden" name="precio" value="22000">
                <input type="hidden" name="cantidad" value="1">
                <input type="hidden" name="sku" value="BROCHE-MARIPOSAS-001">
                <button type="submit" class="comprar">Pulse aquí para comprar</button>
            </form>
        </div>

        <div class="producto">
            <div>
                <img src="/Imagenes/Broche/Broche_pluma.PNG" alt="Broche con pluma" class="imagen-placeholder">
            </div>
            <p>Broche con diseño de pluma.</p>
            <p class="precio">$24,000</p>
            <form action="/pay" method="post" style="display: inline;">
                <input type="hidden" name="nombre" value="Broche con diseño de pluma">
                <input type="hidden" name="precio" value="24000">
                <input type="hidden" name="cantidad" value="1">
                <input type="hidden" name="sku" value="BROCHE-PLUMA-001">
                <button type="submit" class="comprar">Pulse aquí para comprar</button>
            </form>
        </div>
    </section>

</html>
